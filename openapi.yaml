openapi: 3.0.3
info:
  title: Team Task Tracker API
  version: 1.0.0
  description: |
    Nextwave take-home backend API (Express + MySQL/Sequelize + JWT auth + RBAC + Redis task-list caching).

servers:
  - url: http://localhost:5000/api/v1
    description: Local dev (from `.env` PORT)

tags:
  - name: Auth
  - name: Tasks
  - name: Users
  - name: Projects

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register (creates org + ADMIN user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token (rotates refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revokes refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: No Content
        "400":
          $ref: "#/components/responses/ValidationError"

  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks (pagination + filters)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: status
          schema:
            type: string
            enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
        - in: query
          name: priority
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH]
        - in: query
          name: assigneeId
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Tasks]
      summary: Create task (ADMIN/MANAGER only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, minimum: 1 }

    get:
      tags: [Tasks]
      summary: Get task by id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Tasks]
      summary: Update task by id
      description: |
        Enforces status transitions on the server.
        Only assignee or MANAGER can change status.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Tasks]
      summary: Delete task by id (ADMIN/MANAGER only)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    post:
      tags: [Users]
      summary: Create user in org (ADMIN only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

    get:
      tags: [Users]
      summary: List users in org (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, minimum: 1 }

    get:
      tags: [Users]
      summary: Get user by id (ADMIN only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Users]
      summary: Update user (ADMIN only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects:
    get:
      tags: [Projects]
      summary: List projects in org
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Projects]
      summary: Create project (ADMIN/MANAGER only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, minimum: 1 }

    get:
      tags: [Projects]
      summary: Get project by id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Projects]
      summary: Update project (ADMIN/MANAGER only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Projects]
      summary: Delete project (ADMIN/MANAGER only)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: 400
            code: VALIDATION_ERROR
            message: '"title" is required'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: 401
            code: UNAUTHORIZED
            message: Invalid or expired token
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: 403
            code: FORBIDDEN
            message: Insufficient permissions
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: 404
            code: NOT_FOUND
            message: Task not found
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: 409
            code: CONFLICT
            message: Email already registered

  schemas:
    ErrorResponse:
      type: object
      required: [status, code, message]
      properties:
        status: { type: integer }
        code: { type: string }
        message: { type: string }

    AuthTokens:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }

    RegisterRequest:
      type: object
      required: [org_name, name, email, password]
      properties:
        org_name: { type: string, example: Demo Org }
        name: { type: string, example: Admin }
        email: { type: string, example: admin@example.com }
        password: { type: string, example: Admin@12345 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, example: admin@example.com }
        password: { type: string, example: Admin@12345 }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    Task:
      type: object
      properties:
        id: { type: integer, example: 1 }
        orgId: { type: integer, example: 1 }
        projectId: { type: integer, nullable: true, example: 1 }
        title: { type: string, example: First task }
        description: { type: string, nullable: true, example: demo }
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        status:
          type: string
          enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
        assigneeId: { type: integer, example: 1 }
        createdById: { type: integer, example: 1 }
        dueDate: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateTaskRequest:
      type: object
      required: [title, assigneeId]
      properties:
        title: { type: string, example: First task }
        description: { type: string, nullable: true, example: demo }
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          default: MEDIUM
        status:
          type: string
          enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
          default: TODO
        assigneeId: { type: integer, example: 1 }
        projectId: { type: integer, nullable: true, example: 1 }
        dueDate: { type: string, format: date-time, nullable: true }

    UpdateTaskRequest:
      type: object
      minProperties: 1
      properties:
        title: { type: string }
        description: { type: string, nullable: true }
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        status:
          type: string
          enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
        assigneeId: { type: integer }
        projectId: { type: integer, nullable: true }
        dueDate: { type: string, format: date-time, nullable: true }

    TaskListResponse:
      type: object
      required: [page, limit, total, data]
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 1 }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    User:
      type: object
      properties:
        id: { type: integer, example: 2 }
        orgId: { type: integer, example: 1 }
        name: { type: string, example: Manager One }
        email: { type: string, example: manager@example.com }
        role:
          type: string
          enum: [ADMIN, MANAGER, MEMBER]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateUserRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name: { type: string, example: Manager One }
        email: { type: string, example: manager@example.com }
        password: { type: string, example: Admin@12345 }
        role:
          type: string
          enum: [MANAGER, MEMBER]

    UpdateUserRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        role:
          type: string
          enum: [ADMIN, MANAGER, MEMBER]

    UserListResponse:
      type: object
      required: [page, limit, total, data]
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 1 }
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"

    Project:
      type: object
      properties:
        id: { type: integer, example: 1 }
        orgId: { type: integer, example: 1 }
        name: { type: string, example: Website Redesign }
        description: { type: string, nullable: true, example: Q3 initiative }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Website Redesign }
        description: { type: string, nullable: true, example: Q3 initiative }

    UpdateProjectRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        description: { type: string, nullable: true }

    ProjectListResponse:
      type: object
      required: [page, limit, total, data]
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 1 }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
