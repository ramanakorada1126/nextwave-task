openapi: 3.0.0
info:
  title: Nextwave Task Tracker API
  description: A comprehensive task management API with role-based access control, project management, and task tracking features.
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:5000/api/v1
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from login/register endpoint

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        orgId:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        role:
          type: string
          enum: [ADMIN, MANAGER, MEMBER]
          example: ADMIN

    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        orgId:
          type: integer
          example: 1
        projectId:
          type: integer
          example: 1
          nullable: true
        title:
          type: string
          example: Design login screen
        description:
          type: string
          example: Create UI mockups for the login screen
          nullable: true
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          example: HIGH
        status:
          type: string
          enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
          example: TODO
        assigneeId:
          type: integer
          example: 2
        dueDate:
          type: string
          format: date-time
          example: 2026-06-30T00:00:00Z
          nullable: true
        createdById:
          type: integer
          example: 1
        completedAt:
          type: string
          format: date-time
          example: 2026-06-15T10:30:00Z
          nullable: true

    AuthResponse:
      type: object
      properties:
        status:
          type: integer
          example: 201
        message:
          type: string
          example: Registered
        data:
          type: object
          properties:
            access_token:
              type: string
              description: JWT access token for API authentication
            refresh_token:
              type: string
              description: Refresh token for obtaining new access tokens

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: Validation Error
        data:
          type: object

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the API is running and healthy
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: OK
                  data:
                    type: object
                    properties:
                      ok:
                        type: boolean
                        example: true
                      name:
                        type: string
                        example: Nextwave Task Tracker API

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new organization and user
      description: Create a new organization and register the first admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_name, name, email, password]
              properties:
                org_name:
                  type: string
                  minLength: 2
                  maxLength: 120
                  example: Acme Corp
                name:
                  type: string
                  minLength: 2
                  maxLength: 120
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@acme.com
                password:
                  type: string
                  minLength: 8
                  maxLength: 200
                  format: password
                  example: SecurePass123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Validation error

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      description: Authenticate user with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: john@acme.com
                password:
                  type: string
                  format: password
                  example: SecurePass123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Get a new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIs...
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user
      description: Revoke the refresh token and logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIs...
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Logged out
                  data:
                    type: 'null'

  /tasks:
    post:
      tags:
        - Tasks
      summary: Create a new task
      description: Create a new task (requires ADMIN or MANAGER role)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, assigneeId]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                  example: Design login screen
                description:
                  type: string
                  maxLength: 5000
                  nullable: true
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH]
                  default: MEDIUM
                status:
                  type: string
                  enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
                  default: TODO
                assigneeId:
                  type: integer
                projectId:
                  type: integer
                  nullable: true
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

    get:
      tags:
        - Tasks
      summary: List tasks
      description: Get all tasks with optional filtering and pagination
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
        - name: priority
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH]
        - name: assigneeId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized

  /tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Get task by ID
      description: Retrieve a specific task by its ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
        '403':
          description: Forbidden

    patch:
      tags:
        - Tasks
      summary: Update task
      description: Update task details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  maxLength: 5000
                  nullable: true
                priority:
                  type: string
                  enum: [LOW, MEDIUM, HIGH]
                status:
                  type: string
                  enum: [TODO, IN_PROGRESS, IN_REVIEW, DONE, BLOCKED]
                assigneeId:
                  type: integer
                projectId:
                  type: integer
                  nullable: true
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
        '403':
          description: Forbidden

    delete:
      tags:
        - Tasks
      summary: Delete task
      description: Delete a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task deleted successfully
        '404':
          description: Task not found
        '403':
          description: Forbidden

  /users/user:
    post:
      tags:
        - Users
      summary: Create a new user
      description: Create a new user in the organization (requires ADMIN role)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 120
                  example: Jane Smith
                email:
                  type: string
                  format: email
                  example: jane@acme.com
                password:
                  type: string
                  minLength: 8
                  maxLength: 200
                  format: password
                role:
                  type: string
                  enum: [MANAGER, MEMBER]
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /users:
    get:
      tags:
        - Users
      summary: List users
      description: Get all users in the organization (requires ADMIN role)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve a specific user by ID (requires ADMIN role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
        '403':
          description: Forbidden

    patch:
      tags:
        - Users
      summary: Update user
      description: Update user details (requires ADMIN role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 120
                role:
                  type: string
                  enum: [ADMIN, MANAGER, MEMBER]
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found
        '403':
          description: Forbidden
